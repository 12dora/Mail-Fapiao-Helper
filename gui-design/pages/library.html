<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>发票库 · 发票助手</title>
    <link rel="stylesheet" href="../styles/main.css">
</head>
<body data-page="library">
<div class="app">
    <div id="titlebar-mount"></div>
    <div id="app-shell"></div>

    <main class="main">
        <div class="toolbar">
            <span class="toolbar__crumb">工作流</span>
            <span class="toolbar__title">发票库</span>
            <div class="toolbar__spacer"></div>
            <span class="toolbar__meta"><span data-lib="recognized">0</span> 条识别结果 · 发票清册</span>
        </div>

        <div class="page stagger">
            <!-- 统计卡片 -->
            <div class="stats">
                <div class="stat">
                    <div class="stat__label">待识别文件</div>
                    <div class="stat__value" data-lib="total">0</div>
                    <div class="stat__delta is-flat">待识别清单</div>
                </div>
                <div class="stat">
                    <div class="stat__label">已识别</div>
                    <div class="stat__value" data-lib="recognized">0</div>
                    <div class="stat__delta">已识别</div>
                </div>
                <div class="stat">
                    <div class="stat__label">支撑材料</div>
                    <div class="stat__value" data-lib="ignored">0</div>
                    <div class="stat__delta is-flat">已归档</div>
                </div>
                <div class="stat">
                    <div class="stat__label">失败</div>
                    <div class="stat__value" style="color: var(--err);" data-lib="failed">0</div>
                    <div class="stat__delta is-down">暂未识别</div>
                </div>
            </div>

            <!-- 过滤栏 -->
            <div class="filterbar">
                <input class="input" data-search="library" placeholder="按销售方、票号、金额搜索…" style="width: 280px;">

                <div class="tabs">
                    <button class="tab is-active" data-library-tab="all">全部</button>
                    <button class="tab" data-library-tab="recognized">已识别</button>
                    <button class="tab" data-library-tab="failed">失败</button>
                    <button class="tab" data-library-tab="supporting">支撑材料</button>
                    <button class="tab" data-library-tab="itinerary">行程单</button>
                </div>

                <select class="select" data-library-seller style="width: 160px;">
                    <option value="">全部销售方</option>
                </select>

                <label style="display: flex; align-items: center; gap: 6px; font-size: 12.5px; color: var(--fg-muted);">
                    <div class="check" data-filter="library-failed"></div>
                    仅失败项
                </label>

                <div class="spacer"></div>
                <button class="btn btn--sm" data-action="open-invoices-folder">打开归档目录</button>
                <button class="btn btn--sm btn--primary" data-action="ocr-toggle" data-ocr-mode="start">开始识别</button>
                <select class="select" data-ocr-parallel style="width: 120px;">
                    <option value="1" selected>1 个并行</option>
                    <option value="2">2 个并行</option>
                    <option value="4">4 个并行</option>
                    <option value="8">8 个并行</option>
                </select>
                <button class="btn btn--sm" data-action="organize">整理输出</button>
            </div>

            <div class="grid-3">
                <div class="card card--tight">
                    <div class="row row--between">
                        <span class="small muted">通行费汇总单</span>
                        <span class="mono strong" data-lib="supporting">0</span>
                    </div>
                    <div class="small muted mt-12">通行费汇总材料</div>
                </div>
                <div class="card card--tight">
                    <div class="row row--between">
                        <span class="small muted">行程/订单明细</span>
                        <span class="mono strong" data-lib="itinerary">0</span>
                    </div>
                    <div class="small muted mt-12">行程明细与订单明细</div>
                </div>
                <div class="card card--tight">
                    <div class="row row--between">
                        <span class="small muted">结账单/堂食明细</span>
                        <span class="mono strong" data-lib="pending">0</span>
                    </div>
                    <div class="small muted mt-12">结账单与堂食明细</div>
                </div>
            </div>

            <div class="card card--tight" data-ocr-runner>
                <div class="row row--between">
                    <div>
                        <div class="strong" data-ocr-phase>识别进度</div>
                        <div class="small muted mt-12">点击“开始识别”后，会实时显示当前处理情况</div>
                    </div>
                    <span class="mono small muted" data-ocr-counts>0 / 0</span>
                </div>
                <div class="progress is-idle mt-12" data-ocr-progress>
                    <div class="progress__bar" data-ocr-bar style="--p: 0%"></div>
                </div>
                <div class="row gap-12 mt-12 mono small muted">
                    <span>成功 <strong class="strong" data-ocr-parsed>0</strong></span>
                    <span>跳过 <strong class="strong" data-ocr-skipped>0</strong></span>
                    <span>失败 <strong style="color: var(--err);" data-ocr-failed>0</strong></span>
                </div>
                <div class="ocr-log mt-12" data-ocr-log>
                    <div class="ocr-log__line">暂无识别日志。</div>
                </div>
            </div>

            <!-- 发票表格 -->
            <div class="table-wrap">
                <table class="table">
                    <thead>
                        <tr>
                            <th style="width: 110px;" data-sort-key="date">开票日期</th>
                            <th data-sort-key="seller">销售方</th>
                            <th style="width: 200px;" data-sort-key="invoiceNo">发票号码</th>
                            <th class="col-num" style="width: 130px;" data-sort-key="amount">金额</th>
                            <th style="width: 100px;" data-sort-key="source">来源</th>
                            <th style="width: 180px;" data-sort-key="filename">文件名</th>
                            <th style="width: 90px;" data-sort-key="status">状态</th>
                            <th style="width: 80px;">操作</th>
                        </tr>
                    </thead>
                    <tbody data-library-rows>
                        <tr><td colspan="8" class="muted">暂无识别结果。请先抓取邮件并运行识别。</td></tr>
                    </tbody>
                </table>
            </div>

            <!-- 结果统计 -->
            <div class="row row--between mt-16">
                <div class="small mono muted"><span data-library-page>显示 0 · 共 0 条</span> · <span data-library-sellers>销售方：全部</span></div>
            </div>
        </div>
    </main>
</div>

<script src="../scripts/shell.js"></script>
</body>
</html>
