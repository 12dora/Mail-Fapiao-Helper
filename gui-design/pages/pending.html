<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>待处理队列 · 发票助手</title>
    <link rel="stylesheet" href="../styles/main.css">
</head>
<body data-page="pending">
<div class="app">
    <div id="titlebar-mount"></div>
    <div id="app-shell"></div>

    <main class="main">
        <div class="toolbar">
            <span class="toolbar__crumb">工作流</span>
            <span class="toolbar__title">待处理队列</span>
            <div class="toolbar__spacer"></div>
            <span class="toolbar__meta"><span data-pending="total">0</span> 封待处理 · 待确认清单</span>
        </div>

        <div class="page stagger">
            <div class="stats">
                <div class="stat" data-pending-stat>
                    <div class="stat__label">暂无待确认</div>
                    <div class="stat__value">0</div>
                    <div class="stat__delta is-flat">无需处理</div>
                </div>
                <div class="stat" data-pending-stat>
                    <div class="stat__label">暂无待确认</div>
                    <div class="stat__value">0</div>
                    <div class="stat__delta is-flat">无需处理</div>
                </div>
                <div class="stat" data-pending-stat>
                    <div class="stat__label">暂无待确认</div>
                    <div class="stat__value">0</div>
                    <div class="stat__delta is-flat">无需处理</div>
                </div>
                <div class="stat" data-pending-stat>
                    <div class="stat__label">暂无待确认</div>
                    <div class="stat__value">0</div>
                    <div class="stat__delta is-flat">无需处理</div>
                </div>
            </div>

            <div class="card" style="background: var(--warn-soft); border-color: var(--warn);">
                <div class="row gap-12">
                    <svg class="ic ic--lg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" style="color: var(--warn); flex-shrink: 0;"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                    <div style="flex: 1;">
                        <div class="strong">这些邮件大多是历史链接过期，继续自动重试通常也无法下载</div>
                        <div class="small muted" style="margin-top: 4px;">你可以打开原邮件、重新授权、手动添加文件，或确认这封邮件不用处理。</div>
                    </div>
                    <div class="row gap-8" style="align-self: flex-start;">
                        <button class="btn btn--sm" data-action="export-table">复制为 CSV</button>
                        <button class="btn btn--sm btn--primary" data-action="reload-summary">刷新列表</button>
                    </div>
                </div>
            </div>

            <div class="filterbar">
                <div class="tabs">
                    <button class="tab is-active" data-pending-tab="all">全部</button>
                    <button class="tab" data-pending-tab="refresh_link">刷新链接</button>
                    <button class="tab" data-pending-tab="retry">网络重试</button>
                    <button class="tab" data-pending-tab="manual_archive">手动归档</button>
                    <button class="tab" data-pending-tab="ignore">可忽略</button>
                </div>

                <div class="spacer"></div>
                <button class="btn btn--sm" data-action="open-pending-folder">打开待确认文件夹</button>
                <button class="btn btn--sm" data-action="reload-summary">刷新列表</button>
            </div>

            <div data-pending-groups>
                <div class="card"><div class="strong">暂无待确认邮件</div><div class="small muted mt-12">当前本地队列为空。</div></div>
            </div>
        </div>
    </main>
</div>

<script src="../scripts/shell.js"></script>
</body>
</html>
