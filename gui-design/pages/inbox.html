<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>收件箱 · 发票助手</title>
    <link rel="stylesheet" href="../styles/main.css">
</head>
<body data-page="inbox">
<div class="app">
    <div id="titlebar-mount"></div>
    <div id="app-shell"></div>

    <main class="main">
        <div class="toolbar">
            <span class="toolbar__crumb">工作流</span>
            <span class="toolbar__title">邮件记录</span>
            <div class="toolbar__spacer"></div>
            <span class="toolbar__meta"><span data-inbox="total">0</span> 封邮件 · 本地缓存</span>
        </div>

        <div class="page stagger">
            <!-- 统计卡片 -->
            <div class="stats">
                <div class="stat">
                    <div class="stat__label">累计邮件</div>
                    <div class="stat__value" data-inbox="total">0</div>
                    <div class="stat__delta">本地缓存</div>
                </div>
                <div class="stat">
                    <div class="stat__label">有附件</div>
                    <div class="stat__value" data-inbox="with-attachment">0</div>
                    <div class="stat__delta">69% 比例</div>
                </div>
                <div class="stat">
                    <div class="stat__label">含链接</div>
                    <div class="stat__value" data-inbox="with-links">0</div>
                    <div class="stat__delta">86% 比例</div>
                </div>
                <div class="stat">
                    <div class="stat__label">最早邮件</div>
                    <div class="stat__value mono" style="font-size: 16px;" data-inbox="earliest">暂无</div>
                    <div class="stat__delta is-flat">最早月份</div>
                </div>
            </div>

            <!-- 过滤栏 -->
            <div class="filterbar">
                <input class="input" data-search="inbox" placeholder="按主题、发件人、编号搜索…" style="width: 280px;">

                <div class="chip" data-toggle data-filter="inbox-attachment">
                    <svg class="ic ic--sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
                    有附件
                </div>
                <div class="chip" data-toggle data-filter="inbox-links">
                    <svg class="ic ic--sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
                    含链接
                </div>

                <div class="spacer"></div>
                <button class="btn btn--sm" data-action="export-table">复制为 CSV</button>
                <button class="btn btn--sm" data-action="open-samples-folder">打开邮件缓存</button>
            </div>

            <!-- 结果统计 -->
            <div class="row row--between mt-24">
                <div class="small mono muted" data-inbox-page>显示 0 · 共 0 行</div>
            </div>

            <div class="table-wrap">
                <table class="table">
                    <thead>
                        <tr>
                            <th style="width: 140px;" data-sort-key="date">日期</th>
                            <th style="width: 220px;" data-sort-key="from">发件人</th>
                            <th data-sort-key="subject">主题</th>
                            <th style="width: 90px;" data-sort-key="hasAttachment">附件</th>
                            <th style="width: 70px;" data-sort-key="bodyLinkCount">链接</th>
                            <th style="width: 110px;" data-sort-key="mailbox">邮箱</th>
                            <th style="width: 100px;">状态</th>
                        </tr>
                    </thead>
                    <tbody data-inbox-rows>
                        <tr><td colspan="7" class="muted">暂无本地缓存邮件。配置邮箱后点击“开始抓取”。</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script src="../scripts/shell.js"></script>
</body>
</html>
